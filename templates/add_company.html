{% extends 'base.html' %}
{% block title %}Add Company - CampusHire Portal{% endblock %}
{% block page_title %}Add Company{% endblock %}
{% block content %}
<div class="page-actions">
    <a href="{{ url_for('companies') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:700px;">
    <div class="card-header"><span class="card-title">Add New Company</span></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Company Name *</label>
                    <input type="text" name="name" class="form-control" required placeholder="Company name">
                </div>
                <div class="form-group">
                    <label class="form-label">Industry</label>
                    <select name="industry" class="form-control">
                        <option value="">Select Industry</option>
                        <option>IT & Software</option>
                        <option>Banking & Finance</option>
                        <option>Manufacturing</option>
                        <option>Consulting</option>
                        <option>Healthcare</option>
                        <option>Education</option>
                        <option>E-commerce</option>
                        <option>Telecom</option>
                        <option>Government</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Website</label>
                <input type="url" name="website" class="form-control" placeholder="https://company.com">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" placeholder="Brief company description"></textarea>
            </div>
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label">HR Name</label>
                    <input type="text" name="hr_name" class="form-control" placeholder="HR contact name">
                </div>
                <div class="form-group">
                    <label class="form-label">HR Email</label>
                    <input type="email" name="hr_email" class="form-control" placeholder="hr@company.com">
                </div>
                <div class="form-group">
                    <label class="form-label">HR Phone</label>
                    <input type="text" name="hr_phone" class="form-control" placeholder="+91 XXXXXXXXXX">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" style="min-height:70px;" placeholder="Company address"></textarea>
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Company</button>
                <a href="{{ url_for('companies') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

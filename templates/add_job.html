{% extends 'base.html' %}
{% block title %}Post Job - CampusHire Portal{% endblock %}
{% block page_title %}Post New Job{% endblock %}
{% block content %}
<div class="page-actions">
    <a href="{{ url_for('jobs') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:820px;">
    <div class="card-header"><span class="card-title">Post New Job</span></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Job Title *</label>
                    <input type="text" name="title" class="form-control" required placeholder="e.g. Software Engineer">
                </div>
                <div class="form-group">
                    <label class="form-label">Company *</label>
                    <select name="company_id" class="form-control" required>
                        <option value="">Select Company</option>
                        {% for c in companies %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Job Description</label>
                <textarea name="description" class="form-control" placeholder="Describe the role, responsibilities, and what you're looking for..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Requirements</label>
                <textarea name="requirements" class="form-control" style="min-height:80px;" placeholder="Required skills, experience, qualifications..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" placeholder="e.g. Bangalore, Remote">
                </div>
                <div class="form-group">
                    <label class="form-label">Job Type</label>
                    <select name="job_type" class="form-control">
                        <option>full-time</option>
                        <option>part-time</option>
                        <option>internship</option>
                        <option>contract</option>
                    </select>
                </div>
            </div>
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label">Min Salary (LPA)</label>
                    <input type="number" name="salary_min" class="form-control" step="0.1" min="0" placeholder="e.g. 6">
                </div>
                <div class="form-group">
                    <label class="form-label">Max Salary (LPA)</label>
                    <input type="number" name="salary_max" class="form-control" step="0.1" min="0" placeholder="e.g. 12">
                </div>
                <div class="form-group">
                    <label class="form-label">Deadline</label>
                    <input type="date" name="deadline" class="form-control">
                </div>
            </div>
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label">Minimum CGPA</label>
                    <input type="number" name="min_cgpa" class="form-control" step="0.1" min="0" max="10" value="0" placeholder="e.g. 6.5">
                </div>
                <div class="form-group">
                    <label class="form-label">Allowed Backlogs</label>
                    <input type="number" name="allowed_backlogs" class="form-control" min="0" value="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Allowed Departments</label>
                    <input type="text" name="allowed_departments" class="form-control" placeholder="All or CS, IT, ECE">
                </div>
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-success"><i class="fas fa-paper-plane"></i> Post Job</button>
                <a href="{{ url_for('jobs') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

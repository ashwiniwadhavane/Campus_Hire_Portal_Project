{% extends 'base.html' %}
{% block title %}Change Password - CampusHire Portal{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="page-actions">
    <a href="{{ url_for('profile') }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Profile</a>
</div>
<div class="card" style="max-width:440px;">
    <div class="card-header"><span class="card-title">Change Password</span></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" name="current_password" class="form-control" required placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" required placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required placeholder="Re-enter new password">
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Change Password</button>
                <a href="{{ url_for('profile') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

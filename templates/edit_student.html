{% extends 'base.html' %}
{% block title %}Edit Student - CampusHire Portal{% endblock %}
{% block page_title %}Edit Student Profile{% endblock %}
{% block content %}
<div class="page-actions">
    <a href="{{ url_for('student_detail', sid=student.id) }}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:780px;">
    <div class="card-header"><span class="card-title">Edit Profile: {{ student.name }}</span></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Department</label>
                    <select name="department" class="form-control" required>
                        {% for dept in ['Computer Science','Information Technology','Electronics & Communication','Electrical Engineering','Mechanical Engineering','Civil Engineering','Chemical Engineering','MBA','MCA'] %}
                        <option {{ 'selected' if student.department == dept }}>{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label">CGPA</label>
                    <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10" value="{{ student.cgpa or '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Backlogs</label>
                    <input type="number" name="backlogs" class="form-control" min="0" value="{{ student.backlogs or 0 }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Year of Passing</label>
                    <input type="number" name="year_of_passing" class="form-control" min="2000" max="2030" value="{{ student.year_of_passing or '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ student.phone or '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-control">
                        <option value="">Select</option>
                        <option {{ 'selected' if student.gender == 'Male' }}>Male</option>
                        <option {{ 'selected' if student.gender == 'Female' }}>Female</option>
                        <option {{ 'selected' if student.gender == 'Other' }}>Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="date_of_birth" class="form-control" value="{{ student.date_of_birth or '' }}">
            </div>
            <div class="form-group">
                <label class="form-label">Skills <span class="form-hint">(comma-separated)</span></label>
                <input type="text" name="skills" class="form-control" value="{{ student.skills or '' }}" placeholder="e.g. Python, Java, SQL, React">
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control">{{ student.address or '' }}</textarea>
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                <a href="{{ url_for('student_detail', sid=student.id) }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

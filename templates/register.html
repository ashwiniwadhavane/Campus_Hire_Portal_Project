{% extends 'base.html' %}
{% block title %}Register - CampusHire Portal{% endblock %}
{% block auth_content %}
<div class="auth-card" style="max-width:520px;">
    <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-graduation-cap"></i></div>
        <div class="auth-title">Create Account</div>
        <div class="auth-subtitle">Join CampusHire Portal today</div>
    </div>
    <div class="auth-body">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@campus.edu" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label class="form-label">Register As</label>
                <select name="role" id="roleSelect" class="form-control" required>
                    <option value="">Select your role</option>
                    <option value="student">Student</option>
                    <option value="company">Company / Recruiter</option>
                </select>
            </div>
            <div id="studentFields" style="display:none;">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Roll Number</label>
                        <input type="text" name="roll_number" class="form-control" placeholder="e.g. CS2021001">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <select name="department" class="form-control">
                            <option value="">Select department</option>
                            <option>Computer Science</option>
                            <option>Information Technology</option>
                            <option>Electronics & Communication</option>
                            <option>Electrical Engineering</option>
                            <option>Mechanical Engineering</option>
                            <option>Civil Engineering</option>
                            <option>Chemical Engineering</option>
                            <option>MBA</option>
                            <option>MCA</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="companyFields" style="display:none;">
                <div class="form-group">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company_name" class="form-control" placeholder="Your company name">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
    </div>
    <div class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
</div>
{% endblock %}
